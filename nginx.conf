worker_processes  1;
events { worker_connections  1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name rhcjw.com www.rhcjw.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name rhcjw.com www.rhcjw.com;

        ssl_certificate      C:/ssl/fullchain.pem;
        ssl_certificate_key  C:/ssl/rhcjw.com-key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
        ssl_prefer_server_ciphers on;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        client_max_body_size 500m;

        location ^~ /.well-known/acme-challenge/ {
            root C:/acme-challenge;
            default_type text/plain;
        }

        # ★ 行情推送 → Linux 5000
        location = /update_price {
            proxy_pass http://101.43.58.112:5000/update_price;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 价格/K线接口（本地服务）
        location ~ ^/api/(kline|price) {
            proxy_pass http://127.0.0.1:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===== 交易端 → 远程 Linux 5000 =====
        location /trade/ {
            proxy_pass http://101.43.58.112:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /trade;
        }

        location /trade/static/ {
            proxy_pass http://101.43.58.112:5000/static/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /trade/api/ {
            proxy_pass http://101.43.58.112:5000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /trade/socket.io/ {
            proxy_pass http://101.43.58.112:5000/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 忘记密码相关 → 远程 5000
        location /forgot-password {
            proxy_pass http://101.43.58.112:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /verify-reset-code {
            proxy_pass http://101.43.58.112:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /reset-password {
            proxy_pass http://101.43.58.112:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ★ 分润仪表盘专用（只读接口，直接访问交易系统 5000）
        location /api/profit_share_balance {
            proxy_pass http://101.43.58.112:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/profit_share_equity_curve {
            proxy_pass http://101.43.58.112:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ★ PayPack 支付接口 → 本地 8000（必须放在 /api/ 之前）
        location /api/paypack/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===== 主站/社区/教学等 → 远程 5444 =====
        location /api/ {
            proxy_pass https://101.43.58.112:5444;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate C:/nginx/ssl/internal-ca/ca.crt;
            proxy_ssl_name 101.43.58.112;
            proxy_ssl_server_name on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Access-Control-Allow-Origin "https://rhcjw.com" always;
            add_header Access-Control-Allow-Credentials "true" always;
        }

        location /static/ {
            proxy_pass https://101.43.58.112:5444;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate C:/nginx/ssl/internal-ca/ca.crt;
            proxy_ssl_name 101.43.58.112;
            proxy_ssl_server_name on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /community {
            proxy_pass https://101.43.58.112:5444/community/;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate C:/nginx/ssl/internal-ca/ca.crt;
            proxy_ssl_name 101.43.58.112;
            proxy_ssl_server_name on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /community/ {
            proxy_pass https://101.43.58.112:5444;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate C:/nginx/ssl/internal-ca/ca.crt;
            proxy_ssl_name 101.43.58.112;
