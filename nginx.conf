            proxy_ssl_server_name on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /app {
            proxy_pass https://101.43.58.112:5444;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate C:/nginx/ssl/internal-ca/ca.crt;
            proxy_ssl_name 101.43.58.112;
            proxy_ssl_server_name on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===== ★★★ 后台管理/教学/用户中心 → Linux 5001 ★★★ =====
        location /admin/ {
            proxy_pass http://101.43.58.112:5001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /teaching/ {
