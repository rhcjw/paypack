identity:
  name: paypack_query
  author: rhcjw
  label:
    en_US: PayPack Query
    zh_Hans: PayPack 查询
  description:
    en_US: Query the status of a payment by trade/order number.
    zh_Hans: 通过交易号/订单号查询支付状态。
parameters:
  - name: trade_no
    type: string
    required: true
    label:
      en_US: Trade/Order Number
      zh_Hans: 交易号/订单号
    human_description:
      en_US: The trade number (Alipay) or transaction hash (crypto) to query
      zh_Hans: 要查询的交易号（支付宝）或交易哈希（链上）
    llm_description: The trade number or transaction hash to look up
    form: llm

  - name: currency
    type: string
    required: false
    default: CNY
    label:
      en_US: Currency
      zh_Hans: 币种
    human_description:
      en_US: "CNY for Alipay, USDC or ETH for crypto"
      zh_Hans: "CNY 表示支付宝，USDC 或 ETH 表示链上"
    form: llm
    options:
      - value: CNY
        label:
          en_US: CNY (Alipay)
          zh_Hans: CNY（支付宝）
      - value: USDC
        label:
          en_US: USDC
          zh_Hans: USDC
      - value: ETH
        label:
          en_US: ETH
          zh_Hans: ETH
