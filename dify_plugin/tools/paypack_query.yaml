identity:
  name: paypack_query
  author: rhcjw
  label:
    en_US: PayPack Query
  description:
    en_US: Query the status of a payment by trade/order number.
parameters:
  - name: trade_no
    type: string
    required: true
    label:
      en_US: Trade/Order Number
    human_description:
      en_US: The trade number (Alipay) or transaction hash (crypto) to query
    llm_description: The trade number or transaction hash to look up
    form: llm

  - name: currency
    type: string
    required: false
    default: CNY
    label:
      en_US: Currency
    human_description:
      en_US: "CNY for Alipay/WeChat, USDC or ETH for crypto"
    form: llm
    options:
      - value: CNY
        label:
          en_US: CNY (Alipay/WeChat)
      - value: USDC
        label:
          en_US: USDC
      - value: ETH
        label:
          en_US: ETH
