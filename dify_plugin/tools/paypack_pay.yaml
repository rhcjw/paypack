identity:
  name: paypack_pay
  author: rhcjw
  label:
    en_US: PayPack Pay
  description:
    en_US: |
      Make a payment using PayPack. Supports:
      - Cloud API (recommended): Just set API Key → Alipay/WeChat QR code
      - USDC/ETH on-chain (Base, Ethereum, Polygon, Arbitrum)
      - CNY via Alipay or WeChat Pay (local signing)

      For Cloud: set currency="CNY", channel="alipay" or "wechat".
      For crypto: set currency="USDC" or "ETH" and provide wallet address.
      Auto-routes to available channel.
parameters:
  - name: recipient
    type: string
    required: true
    label:
      en_US: Recipient
    human_description:
      en_US: Wallet address (for crypto) or Alipay user ID (for CNY)
    llm_description: The recipient's wallet address or Alipay user ID
    form: llm

  - name: amount
    type: number
    required: true
    label:
      en_US: Amount
    human_description:
      en_US: Payment amount (in the specified currency)
    llm_description: The amount to pay
    form: llm

  - name: currency
    type: string
    required: false
    default: USDC
    label:
      en_US: Currency
    human_description:
      en_US: "USDC, ETH, or CNY (for Alipay/WeChat)"
    llm_description: The currency to use. Use CNY for Alipay/WeChat payments.
    form: llm
    options:
      - value: USDC
        label:
          en_US: USDC
      - value: ETH
        label:
          en_US: ETH
      - value: CNY
        label:
          en_US: CNY (Alipay/WeChat)

  - name: subject
    type: string
    required: false
    label:
      en_US: Payment Subject
    human_description:
      en_US: Description of what the payment is for
    llm_description: A short description of what this payment is for
    form: llm

  - name: channel
    type: string
    required: false
    default: alipay
    label:
      en_US: Payment Channel (Cloud mode)
    human_description:
      en_US: "alipay or wechat. Only for Cloud API mode."
    llm_description: Payment channel for Cloud mode. Use "alipay" or "wechat".
    form: llm
    options:
      - value: alipay
        label:
          en_US: Alipay
      - value: wechat
        label:
          en_US: WeChat Pay
