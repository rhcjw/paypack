identity:
  name: paypack_pay
  author: rhcjw
  label:
    en_US: PayPack Pay
  description:
    en_US: |
      Make a payment using PayPack. Supports:
      - USDC/ETH on-chain (Base, Ethereum, Polygon, Arbitrum)
      - CNY via Alipay or WeChat Pay
      
      For Alipay: set currency="CNY" and provide Alipay user ID.
      For WeChat: set currency="CNY" (add "wechat" in subject to prefer WeChat).
      For crypto: set currency="USDC" or "ETH" and provide wallet address.
      
      Auto-routes to the correct channel. Configure all 3 channels in one plugin instance.
parameters:
  - name: recipient
    type: string
    required: true
    label:
      en_US: Recipient
    human_description:
      en_US: Wallet address (for crypto) or Alipay user ID (for CNY)
    llm_description: The recipient's wallet address or Alipay user ID
    form: llm

  - name: amount
    type: number
    required: true
    label:
      en_US: Amount
    human_description:
      en_US: Payment amount (in the specified currency)
    llm_description: The amount to pay
    form: llm

  - name: currency
    type: string
    required: false
    default: USDC
    label:
      en_US: Currency
    human_description:
      en_US: "USDC, ETH, or CNY (for Alipay/WeChat)"
    llm_description: The currency to use. Use CNY for Alipay/WeChat payments.
    form: llm
    options:
      - value: USDC
        label:
          en_US: USDC
      - value: ETH
        label:
          en_US: ETH
      - value: CNY
        label:
          en_US: CNY (Alipay/WeChat)

  - name: subject
    type: string
    required: false
    label:
      en_US: Payment Subject
    human_description:
      en_US: Description of what the payment is for
    llm_description: A short description of what this payment is for
    form: llm
