identity:
  author: rhcjw
  name: paypack
  label:
    en_US: PayPack
  description:
    en_US: AI Agent universal payment middleware. Pay with USDC, ETH, or CNY (Alipay/WeChat Pay).
  icon: _assets/icon.svg
  tags:
    - finance
    - other
credentials_for_provider:
  payment_mode:
    type: select
    required: true
    default: crypto
    options:
      - value: crypto
        label:
          en_US: Crypto (USDC/ETH on-chain)
      - value: alipay
        label:
          en_US: Alipay (CNY fiat)
    label:
      en_US: Payment Mode
    placeholder:
      en_US: Select payment mode
  private_key:
    type: secret-input
    required: true
    label:
      en_US: Private Key
    placeholder:
      en_US: ETH private key or Alipay merchant private key (PEM)
    help:
      en_US: "For crypto: ETH private key. For Alipay: merchant RSA private key."
  network:
    type: text-input
    required: false
    default: base-sepolia
    label:
      en_US: Network
    placeholder:
      en_US: base-sepolia
    help:
      en_US: Blockchain network (base-sepolia, ethereum, polygon, arbitrum)
  spend_limit_daily:
    type: text-input
    required: false
    default: "10.0"
    label:
      en_US: Daily Spend Limit
    placeholder:
      en_US: "10.0"
    help:
      en_US: Maximum daily spend for AI agent (in the chosen currency)
  broadcast:
    type: select
    required: false
    default: "false"
    options:
      - value: "true"
        label:
          en_US: Yes (broadcast to chain)
      - value: "false"
        label:
          en_US: No (dry run only)
    label:
      en_US: Broadcast Transaction
    placeholder:
      en_US: Select
  app_id:
    type: text-input
    required: false
    label:
      en_US: Alipay App ID
    placeholder:
      en_US: 2021...
    help:
      en_US: Required for Alipay mode. Get this from Alipay Open Platform.
  alipay_public_key:
    type: secret-input
    required: false
    label:
      en_US: Alipay Public Key
    placeholder:
      en_US: "-----BEGIN PUBLIC KEY-----"
    help:
      en_US: Alipay production public key (PEM). Required for Alipay mode.
  sandbox:
    type: select
    required: false
    default: "true"
    options:
      - value: "true"
        label:
          en_US: Sandbox (test mode)
      - value: "false"
        label:
          en_US: Production
    label:
      en_US: Sandbox Mode
    placeholder:
      en_US: Select mode
extra:
  python:
    source: provider/paypack.py
