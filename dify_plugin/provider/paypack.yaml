identity:
  author: rhcjw
  name: paypack
  label:
    en_US: PayPack (x402/AP2 Settlement)
  description:
    en_US: x402/AP2 settlement client for Dify Agents. Settles metered API calls via USDC/ETH (Base/Ethereum/Polygon/Arbitrum) or CNY acquirers (Alipay/WeChat). No arbitrary transfers.
  icon: _assets/icon.svg
  tags:
    - blockchain
    - tool
credentials_for_provider:
  # --- Cloud API (recommended, simplest) ---
  paypack_cloud_url:
    type: text-input
    required: false
    default: "https://rhcjw.com/pay"
    label:
      en_US: Cloud API URL
    placeholder:
      en_US: https://rhcjw.com/pay
    help:
      en_US: PayPack Cloud API address. Uses Cloud-managed Alipay/WeChat channels. No private key needed.
  paypack_api_key:
    type: secret-input
    required: false
    label:
      en_US: Cloud API Key
    placeholder:
      en_US: ppk_xxxxxxxx...
    help:
      en_US: Get your API key at rhcjw.com/pay/dashboard after registration.

  # --- Crypto (USDC/ETH) ---
  crypto_private_key:
    type: secret-input
    required: false
    label:
      en_US: Crypto Private Key
    placeholder:
      en_US: ETH private key (0x...)
    help:
      en_US: Required for USDC/ETH payments. Your Ethereum wallet private key.
  network:
    type: text-input
    required: false
    default: base-sepolia
    label:
      en_US: Blockchain Network
    placeholder:
      en_US: base-sepolia
    help:
      en_US: Blockchain network (base-sepolia, ethereum, polygon, arbitrum)
  spend_limit_daily:
    type: text-input
    required: false
    default: "10.0"
    label:
      en_US: Daily Spend Limit
    placeholder:
      en_US: "10.0"
    help:
      en_US: Maximum daily spend for crypto payments (in the chosen currency)
  broadcast:
    type: select
    required: false
    default: "false"
    options:
      - value: "true"
        label:
          en_US: Yes (broadcast to chain)
      - value: "false"
        label:
          en_US: No (dry run only)
    label:
      en_US: Broadcast Transaction
    placeholder:
      en_US: Select

  # --- Alipay ---
  alipay_app_id:
    type: text-input
    required: false
    label:
      en_US: Alipay App ID
    placeholder:
      en_US: 2021...
    help:
      en_US: Required for Alipay CNY payments. Get this from Alipay Open Platform.
  alipay_private_key:
    type: secret-input
    required: false
    label:
      en_US: Alipay Private Key
    placeholder:
      en_US: "-----BEGIN RSA PRIVATE KEY-----"
    help:
      en_US: Required for Alipay payments. Your Alipay merchant RSA private key (PEM).
  alipay_public_key:
    type: secret-input
    required: false
    label:
      en_US: Alipay Public Key
    placeholder:
      en_US: "-----BEGIN PUBLIC KEY-----"
    help:
      en_US: Required for Alipay payments. Alipay production public key (PEM).
  alipay_sandbox:
    type: select
    required: false
    default: "true"
    options:
      - value: "true"
        label:
          en_US: Sandbox (test mode)
      - value: "false"
        label:
          en_US: Production
    label:
      en_US: Alipay Sandbox Mode
    placeholder:
      en_US: Select mode

  # --- WeChat Pay ---
  wechat_mchid:
    type: text-input
    required: false
    label:
      en_US: WeChat Merchant ID
    placeholder:
      en_US: Merchant ID
    help:
      en_US: Required for WeChat Pay. Your WeChat merchant ID.
  wechat_serial_no:
    type: text-input
    required: false
    label:
      en_US: WeChat Certificate Serial No.
    placeholder:
      en_US: Certificate serial number
    help:
      en_US: Required for WeChat Pay.
  wechat_private_key:
    type: secret-input
    required: false
    label:
      en_US: WeChat Private Key
    placeholder:
      en_US: "-----BEGIN PRIVATE KEY-----"
    help:
      en_US: Required for WeChat Pay. Your WeChat merchant private key.
  wechat_api_v3_key:
    type: secret-input
    required: false
    label:
      en_US: WeChat APIv3 Key
    placeholder:
      en_US: APIv3 key
    help:
      en_US: Required for WeChat Pay.
  wechat_app_id:
    type: text-input
    required: false
    label:
      en_US: WeChat App ID
    placeholder:
      en_US: Mini Program AppID
    help:
      en_US: Required for WeChat Pay. Your Mini Program or App AppID.
  wechat_notify_url:
    type: text-input
    required: false
    label:
      en_US: WeChat Notify URL
    placeholder:
      en_US: https://your-domain.com/wechat/notify
    help:
      en_US: Required for WeChat Pay. Callback URL for payment notifications.
  wechat_license_key:
    type: secret-input
    required: false
    label:
      en_US: WeChat License Key
    placeholder:
      en_US: PAYPACK-WECHAT-v1-...
    help:
      en_US: Required for WeChat Pay. PayPack WeChat module license key.
extra:
  python:
    source: provider/paypack.py
